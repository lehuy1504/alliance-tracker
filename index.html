<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>⚔️ Alliance Tracker</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='bg' cx='50%25' cy='50%25' r='50%25'%3E%3Cstop offset='0%25' stop-color='%230C1520'/%3E%3Cstop offset='100%25' stop-color='%23060A0F'/%3E%3C/radialGradient%3E%3ClinearGradient id='crown' x1='0%25' y1='0%25' x2='0%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23FFD700'/%3E%3Cstop offset='100%25' stop-color='%23FF8C00'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx='32' cy='32' r='32' fill='url(%23bg)'/%3E%3Ccircle cx='32' cy='32' r='30' fill='none' stroke='%2300E5FF' stroke-width='1' stroke-opacity='0.4'/%3E%3Cpolygon points='32,10 38,22 52,22 41,30 45,43 32,35 19,43 23,30 12,22 26,22' fill='url(%23crown)' opacity='0.95'/%3E%3Ctext x='32' y='56' font-family='Arial Black,sans-serif' font-size='10' font-weight='900' fill='%2300E5FF' text-anchor='middle' letter-spacing='1' opacity='0.9'%3ES2AK%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">
    <header style="position:relative">
      <div class="logo">⚔ ALLIANCE TRACKER</div>
      <div class="subtitle">Game Server Intelligence Dashboard - From Tabi 174 with love! ❤️</div>
      <button id="langToggleBtn" onclick="toggleLang()" style="position:absolute;top:16px;right:0;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-dim);font-size:.78rem;padding:4px 10px;cursor:pointer;letter-spacing:1px">🌐 EN</button>
    </header>
    <div class="tabs" id="tabBar"></div>
    <div id="loadingScreen" class="panel" style="text-align:center;padding:50px">
      <div style="font-size:2rem;margin-bottom:10px">⏳</div>
      <div id="loadingText" style="color:var(--text-dim)">Đang load dữ liệu, vui lòng đợi...</div>
    </div>
    <div id="tab-view" class="tab-content" style="display:none"></div>
    <div id="tab-compare" class="tab-content" style="display:none"></div>
    <div id="tab-alliance" class="tab-content" style="display:none"></div>
  </div>

  <!-- PLAYER DETAIL MODAL -->
  <div class="modal-overlay" id="playerModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <div class="modal-header">
        <div>
          <div style="font-size:1.05rem;color:var(--gold)" id="pModalName"></div>
          <div style="font-size:.8rem;color:var(--text-dim);margin-top:3px" id="pModalSub"></div>
        </div>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:.85rem;flex-shrink:0"
          onclick="document.getElementById('playerModal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body" id="pModalBody"></div>
    </div>
  </div>

  <!-- DIFF DETAIL MODAL -->
  <div class="modal-overlay" id="diffModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal modal-wide">
      <div class="modal-header">
        <div>
          <div style="font-size:1.05rem;color:var(--gold)" id="diffModalTitle"></div>
          <div style="font-size:.8rem;color:var(--text-dim);margin-top:3px" id="diffModalSub"></div>
        </div>
        <button class="btn btn-ghost" style="padding:4px 10px;font-size:.85rem;flex-shrink:0"
          onclick="document.getElementById('diffModal').classList.remove('open')">✕</button>
      </div>
      <div class="modal-body" id="diffModalBody"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script type="module" src="app.js"></script>

  <div style="text-align:center;margin-top:30px;padding-top:16px;border-top:1px solid var(--border);padding-bottom:20px">
    <div style="font-size:.72rem;color:var(--text-dim);letter-spacing:1px;line-height:2;margin-bottom:10px">
      <span style="color:var(--gold);font-family:Arial,sans-serif;font-size:.8rem">© Huy Lơ</span>
      &nbsp;·&nbsp; <span id="footerContact">Liên hệ thêm data cho server của bạn:</span>
      &nbsp;·&nbsp; Telegram <a href="https://t.me/lengochuy1504" target="_blank"
        style="color:var(--blue);text-decoration:none">@lengochuy1504</a>
      &nbsp;·&nbsp; ID Game: <span style="color:var(--gold-light)">10404978</span>
      &nbsp;·&nbsp; Player Name: <span style="color:var(--gold-light)">Tabi Crawl Data</span>
      &nbsp;·&nbsp; Server: <span style="color:var(--gold-light)">174</span>
      &nbsp;·&nbsp; <a href="admin.html" style="color:var(--text-dim);text-decoration:none;font-size:.7rem">Admin</a>
    </div>
  </div>
</body>

</html>
